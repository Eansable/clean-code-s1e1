<!DOCTYPE html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" >
    <link rel="stylesheet" href="style.css"  media="screen" charset="utf-8">
  </head>
  <body>
    <header class="header">
      <img src="./eisenhower-matrix.jpg" class="header__img" alt="Eisenhower matrix">
      <a class="more-inf"
         href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </header>
    <main class="wrapper">
      <section class="add__item">
        <label for="new__task" class="new__task__label">Add Item</label>
        <div class="task__row__wrapper">
          <input id="new__task" class="text task" type="text">
          <button class="btn">Add</button>
        </div>
      </section>
      <h3>Todo</h3>
      <ul id="incomplete__tasks">
        <li class="list__item ">
          <input type="checkbox" class="checkbox">
          <label class="task">Pay Bills</label>
          <input type="text" class="text text__hidden">
          <button class="btn edit">Edit</button>
          <button class="btn delete">
            <img src="./remove.svg" class="btn__icon" alt="">
          </button>
        </li>
        <li class="edit__mode list__item">
          <input type="checkbox" class="checkbox">
          <label class="task edit__task">Go Shopping</label>
          <input type="text" value="Go Shopping" class="text task edit__text">
          <button class="btn edit">Save</button>
          <button class="btn delete">
            <img src="./remove.svg" class="btn__icon" alt="">
          </button>
        </li>
      </ul>
      <h3>Completed</h3>
      <ul id="completed__tasks">
        <li class="list__item">
          <input type="checkbox" checked class="checkbox">
          <label class="task completed__task">See the Doctor</label>
          <input type="text" class="text task text__hidden">
          <button class="btn edit">Edit</button>
          <button class="btn delete">
            <img src="./remove.svg" class="btn__icon" alt="">
          </button>
        </li>
      </ul>
    </main>
    <script src="app.js"></script>
  </body>
</html>
